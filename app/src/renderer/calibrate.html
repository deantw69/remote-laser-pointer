<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>calibrate</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: crosshair;
        user-select: none;
      }
      #dim {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
      }
      #hint {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 25, 0.85);
        color: #eee;
        font: 14px system-ui, 'Microsoft JhengHei', sans-serif;
        padding: 10px 18px;
        border-radius: 10px;
        text-align: center;
        pointer-events: none;
      }
      #sel {
        position: fixed;
        border: 2px solid #ff3355;
        background: rgba(255, 51, 85, 0.12);
        box-sizing: border-box;
        pointer-events: none;
      }
      #dims {
        position: absolute;
        right: 4px;
        bottom: 4px;
        color: #fff;
        font: 12px system-ui, sans-serif;
        background: rgba(0, 0, 0, 0.5);
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="dim"></div>
    <div id="sel" hidden><span id="dims"></span></div>
    <div id="hint">
      按住左鍵,框出 Discord 影片的「實際影像範圍」,放開完成;Esc 取消
      <br />
      <span id="aspect-hint"></span>
    </div>
    <script type="module" src="./src/calibrate.ts"></script>
  </body>
</html>
