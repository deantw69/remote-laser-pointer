<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>pointer</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: crosshair;
        user-select: none;
      }
      #frame {
        position: fixed;
        inset: 0;
        border: 2px solid rgba(255, 51, 85, 0.85);
        box-sizing: border-box;
        pointer-events: none;
      }
      #hint {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 25, 0.75);
        color: #eee;
        font: 12px system-ui, sans-serif;
        padding: 4px 12px;
        border-radius: 999px;
        pointer-events: none;
        white-space: nowrap;
      }
      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="frame"></div>
    <div id="hint">指點模式:點=圈圈|拖=畫線|移動=雷射點|Esc / F8 結束</div>
    <script type="module" src="./src/pointer.ts"></script>
  </body>
</html>
